name: Release

# Publish downloadable, ready-to-run macOS + Linux builds. The primary trigger is
# a merge to `main`: the workflow reads the repo-root VERSION file and, if that
# version has not been released yet, tags it and publishes a public release. Each
# build is validated by the full parity gate (same as CI), packaged into a
# self-contained tarball (engine + vendored SDL2 + Freedoom doom1.wad + licenses +
# launcher), then smoke-tested by extracting the tarball into a clean dir and
# booting it headlessly -- proving the vendored dylib/rpath, renamed WAD and
# launcher all work, not just the build tree. A GPLv2 corresponding-source archive
# is attached alongside the binaries.
#
# Release flow:  bump VERSION in your PR -> merge to main -> release publishes.
# A merge that does NOT change VERSION re-runs this workflow but skips publishing
# (the version's tag already exists), so it is safe/idempotent.
# A pushed `v*` tag still works too (e.g. re-cutting a release). The manual
# "Run workflow" button is a draft dry-run (no public tag/download URLs).
# See .github/copilot-instructions.md ("Releases") for the versioning convention.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to package (e.g. v1.0.0) for a manual dry-run'
        required: true
        default: v0.0.0-manual

# Needed for softprops/action-gh-release to create the tag + release.
permissions:
  contents: write

jobs:
  # Resolve the target version and decide whether a publish is warranted. This
  # keeps the expensive build matrix from running on every no-op merge to main.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      draft: ${{ steps.ver.outputs.draft }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "workflow_dispatch" ]; then
            # Manual dry-run: use the input, publish as an inspectable draft.
            V="${{ github.event.inputs.version }}"
            DRAFT=true
            SHOULD=true
          elif [ "${GITHUB_REF}" = "refs/tags/${GITHUB_REF_NAME}" ] && \
               [ "${GITHUB_REF#refs/tags/}" != "${GITHUB_REF}" ]; then
            # Tag push (v1.2.3): version is the tag; always publish.
            V="${GITHUB_REF_NAME}"
            DRAFT=false
            SHOULD=true
          else
            # Push to main: version comes from the VERSION file. Only publish if
            # that version has not already been released (tag does not yet exist).
            if [ ! -f VERSION ]; then
              echo "FAIL: VERSION file missing at repo root"; exit 1
            fi
            V="$(tr -d ' \t\r\n' < VERSION)"
            DRAFT=false
            if git ls-remote --exit-code --tags origin "refs/tags/${V}" >/dev/null 2>&1; then
              echo "Version ${V} already released (tag exists) -> skipping publish."
              SHOULD=false
            else
              echo "Version ${V} is new -> will publish."
              SHOULD=true
            fi
          fi

          case "$V" in
            v*) : ;;
            *) echo "FAIL: version '$V' must start with 'v' (e.g. v1.0.0)"; exit 1 ;;
          esac

          # A pre-release suffix (v1.0.0-rc1, -beta, ...) -> mark prerelease.
          case "$V" in
            *-*) PRERELEASE=true ;;
            *)   PRERELEASE=false ;;
          esac

          {
            echo "version=$V"
            echo "draft=$DRAFT"
            echo "prerelease=$PRERELEASE"
            echo "should_release=$SHOULD"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=$V draft=$DRAFT prerelease=$PRERELEASE should_release=$SHOULD"

  release:
    name: release (${{ matrix.os }})
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-22.04 (not -latest) for a broader glibc floor on the Linux build.
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      SDL_VIDEODRIVER: dummy
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `git archive <tag>` works for the source asset

      - name: Install SDL2 + CMake + patchelf + appimagetool (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libsdl2-dev cmake patchelf file
          # appimagetool builds the single-file .AppImage. It's itself an AppImage;
          # APPIMAGE_EXTRACT_AND_RUN lets it run on a runner without FUSE.
          curl -fL -o /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /usr/local/bin/appimagetool
          echo "APPIMAGE_EXTRACT_AND_RUN=1" >> "$GITHUB_ENV"

      - name: Install real SDL2 (from source) + tools (macOS)
        if: runner.os == 'macOS'
        run: |
          brew list dylibbundler >/dev/null 2>&1 || brew install dylibbundler
          # Homebrew's `sdl2` is now an ALIAS for sdl2-compat -- a shim whose
          # libSDL2-2.0.0.dylib dlopens the real libSDL3 at runtime. dylibbundler
          # only follows link-time deps, so it can't vendor that dlopen'd SDL3; the
          # packaged .app then abort()s in SDL2 `dllinit` on any Mac lacking a
          # Homebrew SDL3. Build REAL SDL2 from source instead: its
          # libSDL2-2.0.0.dylib is fully self-contained (no SDL3), so the vendored
          # bundle runs on a clean machine.
          SDL_VER=2.30.11
          curl -fsSL -o /tmp/SDL2.tar.gz \
            "https://github.com/libsdl-org/SDL/releases/download/release-${SDL_VER}/SDL2-${SDL_VER}.tar.gz"
          rm -rf /tmp/sdl2src && mkdir -p /tmp/sdl2src
          tar -xzf /tmp/SDL2.tar.gz -C /tmp/sdl2src --strip-components=1
          cmake -S /tmp/sdl2src -B /tmp/sdl2build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/sdl2-prefix" \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TEST=OFF
          cmake --build /tmp/sdl2build --target install -j
          echo "CMAKE_PREFIX_PATH=$HOME/sdl2-prefix" >> "$GITHUB_ENV"

      - name: Configure + build
        run: |
          cmake -B build
          cmake --build build

      - name: Parity gate (must be green before we ship)
        run: ctest --test-dir build --output-on-failure

      - name: Package installable artifact (.dmg / .AppImage)
        run: ./tools/package_release.sh "${{ needs.prepare.outputs.version }}" build dist

      - name: Smoke-test the packaged artifact
        shell: bash
        run: |
          set -euo pipefail
          WORK=$(mktemp -d)
          if [ "${{ runner.os }}" = "macOS" ]; then
            # Mount the .dmg, copy DOOM.app out, launch via the bundle launcher.
            DMG=$(ls dist/*.dmg)
            MNT=$(mktemp -d)
            hdiutil attach "$DMG" -nobrowse -mountpoint "$MNT" >/dev/null
            cp -R "$MNT/DOOM.app" "$WORK/DOOM.app"
            hdiutil detach "$MNT" >/dev/null
            LAUNCH=("$WORK/DOOM.app/Contents/MacOS/doom-launcher")
          else
            # Run the AppImage self-extracted (runners may lack FUSE). Use an
            # absolute path: we cd into $WORK below, so a repo-relative path breaks.
            APPIMG="$(pwd)/$(ls dist/*.AppImage)"
            chmod +x "$APPIMG"
            LAUNCH=("$APPIMG" --appimage-extract-and-run)
          fi
          echo "Booting ${LAUNCH[0]} headlessly..."
          cd "$WORK"
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy "${LAUNCH[@]}" -warp 1 1 >boot.log 2>&1 &
          PID=$!
          # Primary signal: is it still alive? A broken app (missing/unloadable
          # vendored lib, bad signature, missing IWAD) dies within a second; a good
          # one loads SDL + doom1.wad and sits at the title screen. Liveness is
          # immune to stdout block-buffering (killed procs don't flush their log).
          # Poll for up to 10s (bounded) instead of a single fixed sleep so a slow
          # runner isn't misjudged: a healthy app survives every tick.
          ALIVE=0
          for _ in $(seq 1 10); do
            sleep 1
            if kill -0 "$PID" 2>/dev/null; then ALIVE=1; else ALIVE=0; break; fi
          done
          RC=0
          if [ "$ALIVE" = 1 ]; then
            kill "$PID" 2>/dev/null || true
            wait "$PID" 2>/dev/null || true
          else
            wait "$PID" 2>/dev/null || RC=$?
          fi
          echo "alive_after_poll=$ALIVE exit_status=$RC"
          echo "===== boot.log (may be empty if killed mid-buffer) ====="
          cat boot.log || true
          echo "======================================================="
          if [ "$ALIVE" = 1 ] || grep -q "P_Init" boot.log; then
            echo "OK: packaged app booted (vendored SDL loaded + doom1.wad found)"
          else
            echo "FAIL: packaged app did not stay up and never reached P_Init (rc=$RC)"
            exit 1
          fi

      - name: Build corresponding-source archive (GPLv2, Linux job only)
        if: runner.os == 'Linux'
        run: |
          git archive --format=tar.gz \
            --prefix="doom-${{ needs.prepare.outputs.version }}-source/" \
            -o "dist/doom-${{ needs.prepare.outputs.version }}-source.tar.gz" HEAD

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: DOOM (Modernized) ${{ needs.prepare.outputs.version }}
          draft: ${{ needs.prepare.outputs.draft }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          fail_on_unmatched_files: false
          files: |
            dist/*.dmg
            dist/*.AppImage
            dist/*-source.tar.gz
